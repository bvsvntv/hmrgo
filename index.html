<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>hmrgo</title>
        <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        main {
            max-width: 320px;
            margin-top: 32px;
            margin-left: auto;
            margin-right: auto;
            background: #f3f4f6;
            padding: 8px;
            border-radius: 8px;
            border: solid 1px #d1d5db;
        }
        main h1, p {
            text-align: center;
        }
        main h1 {
            font-size: 30px;
            color:  #1f2937;
        }
        main p {
            font-size: 14px;
            color:#4b5563;
        }
        main div {
            margin-top: 8px;
            text-align: center;
        }
        main div code {
            font-size: 14px;
            color:#4b5563;
            background-color: #d1d5db ;
            border-radius: 4px;
            padding: 2px 6px 2px 6px;
        }
        </style>
    </head>

    <body>
        <main>
            <h1>hmrgo</h1> 
            <p>understanding hot module replacement</p>

            <div>
                <code>go run main.go --port 6969</code>
            </div>
        </main>
    </body>
</html>
